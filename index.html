<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KodBank | Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>KodBank</h1>
            <p>Welcome back. Please login to your account.</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" autocomplete="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" required placeholder="Enter your password">
            </div>
            <div id="loginError" class="error-msg"></div>
            <button type="submit" class="btn">Login to Dashboard</button>
        </form>
        <div class="footer-link">
            <p>New to KodBank? <a href="register.html">Create an account</a></p>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
