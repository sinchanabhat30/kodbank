<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KodBank | Register</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container" style="max-width: 600px;">
        <div class="header">
            <h1>Join KodBank</h1>
            <p>Create your new banking account.</p>
        </div>
        <form id="registerForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0 1.5rem;">
            <!-- Column 1 -->
            <div>
                <div class="form-group">
                    <label for="uid">User ID</label>
                    <input type="text" id="uid" required placeholder="Generate auto if preferred" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="uname">Username</label>
                    <input type="text" id="uname" required placeholder="Unique username" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Secure password"
                        autocomplete="new-password">
                </div>
            </div>
            <!-- Column 2 -->
            <div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="john@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" required placeholder="+1 234 567 8900" autocomplete="tel">
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <input type="text" id="role" value="customer" readonly>
                </div>
            </div>

            <div id="registerError" class="error-msg" style="grid-column: 1 / -1;"></div>
            <button type="submit" class="btn" style="grid-column: 1 / -1; margin-top: 1.5rem;">Complete
                Registration</button>
        </form>
        <div class="footer-link" style="grid-column: 1 / -1;">
            <p>Already have an account? <a href="index.html">Login here</a></p>
        </div>
    </div>
    <script src="js/register.js"></script>
</body>

</html>
